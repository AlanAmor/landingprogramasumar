spring.application.name=webayudas

# Desabilitar formulario JPA/DataSource
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Base de datos en memoria H2 para evitar errores de DataSource
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuración SMTP para envío de emails (reemplazar con tus datos)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=alan43009459@gmail.com
spring.mail.password=TU_APP_PASSWORD_O_API_KEY
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8

# Si usás otro proveedor, ajusta host, port y seguridad según proveedor
openai.api.key=

